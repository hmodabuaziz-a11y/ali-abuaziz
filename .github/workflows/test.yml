name: Attendance Automation

on:
  workflow_dispatch:
    inputs:
      action:
        description: 'Which action to run'
        required: true
        default: 'checkin'
        type: choice
        options:
          - checkin
          - checkout

  schedule:
    # حضور: يبدأ 7:18 ص الرياض (04:18 UTC) وينتظر حتى 8:18 ص
    - cron: '18 4 * * 0,1,2,3,4'
    # انصراف: يبدأ 3:12 م الرياض (12:12 UTC) وينتظر حتى 4:12 م
    - cron: '12 12 * * 0,1,2,3,4'

jobs:
  run-attendance:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Install Playwright browsers
        run: npx playwright install chromium --with-deps

      - name: Determine script to run
        run: |
          HOUR=$(date -u +%H)
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "SCRIPT=${{ github.event.inputs.action }}.js" >> $GITHUB_ENV
          # إذا كانت الساعة بين 12 و 15 UTC (وقت الانصراف بالرياض)، اختر checkout.js
          elif [ "$HOUR" -ge 12 ] && [ "$HOUR" -le 15 ]; then
            echo "SCRIPT=checkout.js" >> $GITHUB_ENV
          else
            echo "SCRIPT=checkin.js" >> $GITHUB_ENV
          fi

      - name: Show UTC time
        run: echo "Current UTC hour is $HOUR"

      - name: Show which script will run
        run: echo "Running -> ${{ env.SCRIPT }}"

      - name: Run script
        run: node ${{ env.SCRIPT }}
        env:
          ODOO_USERNAME: ${{ secrets.ODOO_USERNAME }}
          ODOO_PASSWORD: ${{ secrets.ODOO_PASSWORD }}

      - name: Upload debug artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: debug-screenshots-${{ github.run_id }}
          path: |
            screenshot_*.png
            page_*.html
          retention-days: 7
